# 배포 설정
# 프로젝트별 배포 브랜치 매핑. 새 프로젝트 추가 시 이 파일만 수정한다.
#
# 사용법:
#   /deploy <project> <env> [source-branch]
#   /deploy be dev feature/my-branch
#
# 아래 예시를 참고하여 팀 프로젝트에 맞게 수정하세요.

projects:
  # 예시 1: 단일 서비스 백엔드 API
  # my-api:
