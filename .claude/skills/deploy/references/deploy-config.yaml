  #   repo_path: projects/my-api/main
  #   aliases: [api, backend]
  #   environments:
  #     dev:
  #       branch: develop
  #     qa:
  #       branch: "qa/{name}"
  #     release:
  #       branch: "release/{version}"
  #       version_format: "CalVer (YYYY.MM.DD)"
  #       version_example: "2026.04.01"

  # 예시 2: 다중 서비스 (ext/int 독립 배포)
  # my-backend:
  #   display_name: My Backend
  #   repo_path: projects/my-backend/main
  #   aliases: [be]
  #   services:
